# render.yaml — Deploy entire Pikly stack to Render.com (free tier)
#
# One-click deploy: https://render.com/deploy
# Or: connect your GitHub repo and Render auto-detects this file.
#
# Free tier limits (as of 2025):
#   Web services  — 512 MB RAM, spins down after 15 min inactivity
#   PostgreSQL    — 1 GB storage, 90-day free trial then $7/month
#   Redis         — Use Upstash instead (always free, see README)
#
# RECOMMENDATION: Use Neon (free PostgreSQL) + Upstash (free Redis)
# and only deploy the web services on Render. This way everything is free forever.

services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: pikly-api
    runtime: node
    region: oregon
    plan: free
    rootDir: api
    buildCommand: npm ci && npm run build
    startCommand: node dist/src/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false          # paste your Neon URL in Render dashboard
      - key: REDIS_URL
        sync: false          # paste your Upstash Redis URL
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALGOLIA_APP_ID
        sync: false
      - key: ALGOLIA_WRITE_KEY
        sync: false
      - key: ALGOLIA_INDEX
        value: products

  # ── Go Cache Proxy ───────────────────────────────────────────────────────────
  - type: web
    name: pikly-proxy
    runtime: go
    region: oregon
    plan: free
    rootDir: services/cache-proxy
    buildCommand: go mod tidy && go build -ldflags="-s -w" -o cache-proxy ./cmd/server
    startCommand: ./cache-proxy
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4000
      - key: UPSTREAM_URL
        fromService:
          type: web
          name: pikly-api
          envVarKey: RENDER_INTERNAL_HOSTNAME
      - key: REDIS_ADDR
        sync: false          # Upstash Redis host:port
      - key: GIN_MODE
        value: release
